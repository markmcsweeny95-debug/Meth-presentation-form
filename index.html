<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Not Active</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow-x: hidden;
    background: black;
}

.container {
    position: relative;
    width: 100%;
}

.container img {
    width: 100%;
    display: block;
}

.message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    color: white;
    font-family: Arial, sans-serif;
    font-size: clamp(2rem, 6vw, 5rem);
    font-weight: bold;
    text-align: center;

    background: rgba(0,0,0,0.7);
    padding: 20px 40px;
    border-radius: 15px;

    z-index: 1000;
}
</style>
</head>
<body>

<div class="message">
    THIS WEBSITE IS CURRENTLY NOT ACTIVE
</div>

<div class="container">
    <img src="1000022583.jpg" alt="Website Background">
</div>

</body>
</html>
